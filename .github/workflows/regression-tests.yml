name: PULP-SDK CI
on: [push, pull_request]

jobs:
  Regression-Tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      
      - name: Check out repository code
        uses: actions/checkout@v4   # Updated to v4 to avoid Node.js deprecation warnings

      - name: Download PULP toolchain
        run: |
          wget https://github.com/pulp-platform/pulp-riscv-gnu-toolchain/releases/download/v1.0.16/v1.0.16-pulp-riscv-gcc-ubuntu-18.tar.bz2
          tar -xf v1.0.16-pulp-riscv-gcc-ubuntu-18.tar.bz2
          
          # The correct way to pass environment variables to future steps in GitHub Actions
          echo "PULP_RISCV_GCC_TOOLCHAIN=${{ github.workspace }}/v1.0.16-pulp-riscv-gcc-ubuntu-18" >> $GITHUB_ENV
          
          # (Optional but recommended) Add the toolchain bin to the global PATH
          echo "${{ github.workspace }}/v1.0.16-pulp-riscv-gcc-ubuntu-18/bin" >> $GITHUB_PATH

      - name: Install PULP-SDK dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential git libftdi-dev libftdi1 doxygen python3-pip libsdl2-dev curl cmake libusb-1.0-0-dev scons gtkwave libsndfile1-dev rsync autoconf automake texinfo libtool pkg-config libsdl2-ttf-dev
          pip install --user argcomplete pyelftools

      - name: Build PULP-SDK
        run: |
          # Source the target environment locally for this step
          source configs/siracusa.sh
          make build

      - name: Launch regression tests
        run: |
          # Re-source the target environment so the simulator and paths are found
          source configs/siracusa.sh
          
          cd tests/
          dirs=$(dirname $(find . -name "Makefile" -printf "%P\n"))
          
          for file in ${dirs}; do 
            cd ${file}
            echo "========================================"
            echo "Running test: ${file}"
            echo "========================================"
            rm -rf BUILD/
            
            # The '|| exit 1' is critical! It ensures the CI fails if the test fails.
            # I also added 'platform=gvsoc' as tests usually require a platform target to run.
            make clean all run platform=gvsoc || exit 1
            
            cd -
          done

      - name: List files in the repository
        run: ls -la ${{ github.workspace }}
        
      - run: echo "This job's status is ${{ job.status }}."
